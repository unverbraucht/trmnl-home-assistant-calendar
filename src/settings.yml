name: "HA Calendar"
strategy: polling
polling_verb: get
polling_url: |
  {% assign base = ha_url | append: '/api/calendars/' | replace: '//api/', '/api/' %}{% assign cals = calendar_entities | split: ',' %}{% for c in cals %}
  {{ base }}{{ c | strip }}?start={{ 'now' | date: '%Y-%m-%d' }}&end={{ 'now' | date: '%s' | plus: 2592000 | date: '%Y-%m-%d' }}
  {% endfor %}
polling_headers: "Authorization: Bearer {{ ha_token }}"
refresh_interval: 15

custom_fields:
  - keyname: ha_url
    field_type: text
    name: "Home Assistant URL"
    help: "e.g. http://192.168.1.100:8123 (no trailing slash)"
    required: true
  - keyname: ha_token
    field_type: text
    name: "Long-Lived Access Token"
    help: "Created in HA under Profile > Long-Lived Access Tokens"
    required: true
  - keyname: calendar_entities
    field_type: text
    name: "Calendar Entity IDs, comma-separated"
    help: "Comma-separated, e.g. calendar.family,calendar.work"
    required: true
  - keyname: days_ahead
    field_type: text
    name: "Days Ahead"
    help: "Number of days of upcoming events (1-30)"
    default: "7"
  - keyname: timezone
    field_type: text
    name: "Timezone"
    help: "e.g. Europe/Berlin, America/New_York"
    default: "UTC"
